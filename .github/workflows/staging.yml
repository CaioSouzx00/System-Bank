name: Deploy — Staging

on:
  push:
    branches: [develop]

jobs:
  deploy-staging:
    name: Deploy para Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Login no registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push API
        uses: docker/build-push-action@v5
        with:
          context: api-rust
          push: true
          tags: ghcr.io/${{ github.repository }}/api:staging-${{ github.sha }}

      - name: Build e push COBOL Worker
        uses: docker/build-push-action@v5
        with:
          context: batch-cobol
          push: true
          tags: ghcr.io/${{ github.repository }}/cobol:staging-${{ github.sha }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/system-bank
            export API_TAG=staging-${{ github.sha }}
            export COBOL_TAG=staging-${{ github.sha }}
            docker compose pull
            docker compose up -d --remove-orphans
